<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARM BANK</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="index.css">
  <style>
      .carousel-item {
          position: relative;
      }

      .carousel-item img {
          width: 100%;
          height: 100vh;
          object-fit: cover;
      }

      .centered-text {
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          color: white;
          font-size: 2rem;
          font-weight: bold;
          text-shadow: 2px 2px 5px black;
          text-align: center;
      }

      .carousel-caption h5 {
          font-size: 3rem;
          font-weight: bold;
          text-align: center;
          color: transparent;
          background-image: linear-gradient(45deg, red, blue, green, yellow);
          -webkit-background-clip: text;
          background-clip: text;
      }

      .carousel-caption p {
          font-size: 1.5rem;
      }
  </style>
</head>
<body>
  <nav>
    <ul>
        <li><a href="index.html">HOME</a></li>
        <li><a href="create.html">CREATE</a></li>
        <li><a href="withdraw.html">WITHDRAW</a></li>
        <li><a href="deposit.html">DEPOSIT</a></li>
        <li><a href="data.html">DETAILS</a></li>
    </ul>
  </nav>

  <div id="bankCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="5000">
      <div class="carousel-indicators">
          <button type="button" data-bs-target="#bankCarousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
          <button type="button" data-bs-target="#bankCarousel" data-bs-slide-to="1" aria-label="Slide 2"></button>
          <button type="button" data-bs-target="#bankCarousel" data-bs-slide-to="2" aria-label="Slide 3"></button>
      </div>
      <div class="carousel-inner">
          <div class="carousel-item active">
              <img src="money-finance-business-financia.jpg" alt="Welcome">
              <div class="centered-text">WELCOME TO OUR ARM BANK</div>
          </div>
          <div class="carousel-item">
              <img src="istockphoto-1058480452-612x612.jpg" alt="Innovative Services">
              <div class="centered-text">Innovative Services for You</div>
          </div>
          <div class="carousel-item">
              <img src="money-finance-business-financia.jpg" alt="Customer First">
              <div class="centered-text">Customer First, Always</div>
          </div>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#bankCarousel" data-bs-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#bankCarousel" data-bs-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
      </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-wx1QLLOgC/pM59ZXt3Xf1K/IF3jIe5foIpO9CZRqoG/MKtohr5cr5A+Oh4jtKRSV" crossorigin="anonymous"></script>
</body>
</html>
